<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5 </title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <picture>
        <source media="(max-width:750px )" srcset="img/fotop.png" type="image/png">
        <source media="(max-width:1050px)" srcset="img/fotom.png" type="image/png">
        <img src="img/fotog.png" alt="G">
    </picture>
    <h1>Audio</h1>
    <audio src="media/Desabafo _ Deixa Eu Dizer - Marcelo D2 (youtube).mp3" controls></audio>
    <audio preload="metadata" controls><source src="media/Desabafo _ Deixa Eu Dizer - Marcelo D2 (youtube).mp3" type="audio/mpeg"></audio>
    <!--Preloand-metadata, evite wav, controls aparece o botão, autoplay toca, loop faz loop-->
<h1>VIDEOS</h1>
<video src="media/15453628_1080_1920_30fps.mp4" width="500px" controls></video>

</body>
</html>
