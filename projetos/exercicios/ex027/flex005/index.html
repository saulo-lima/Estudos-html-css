<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        main#container{
            background-color: antiquewhite;
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-flow: row nowrap;
            justify-content: center;
            align-items: center;

        }
        .item {
            background-color: rgb(243, 243, 243);
            border: 1px solid black ;
            height: 200px;
            width: 200px;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.213);
        }

        section.item > h1 {
            font-size: 1.5em;
        }

        .campo {
            border-radius: 5px;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.213);
            margin: 20px 0px;
        }
    </style>
</head>
<body>
    <main id="container">
        <section class="item">
            <h1>
                Tela de Login
            </h1>
            <form action="#" method="post">
                <div ><input type="text" name="name" id="nameID" placeholder="Nome" maxlength="40" class="campo"></div>

                <div><input type="password" name="senha" id="senhaID" placeholder="Senha" minlength="8" maxlength="20" class="campo"></div>

                <div>
                    <input type="submit" value="ENVIAR">
                </div>


            </form>
        </section>
    </main>
</body>
</html>
