<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralização vertical caixa/div</title>
    <style>
       #container{
        position: relative;
        height: 96vh;
        background: white url(imagens/target001.png);
        padding: 10px;
        background-size: 100% 100%;
       }
       #conteudo{
        position: absolute;
        height: 200px;
        width: 400px;
        left: 50%;
        top: 50%;
        background: red url(imagens/target001.png);
        background-size: 100% 100%;
        transform:translate(-50%, -50%) ;
       }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo"></article>
    </section>
</body>
</html>
