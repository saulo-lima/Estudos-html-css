<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo formulario</title>
</head>
<body>
    <form action="cadastro.php" method="get">
        <p>
            <label for="iano">Que ano você nasceu:</label>
            <input type="number" name="ano" id="iano" min="1900" max="2030"  oninput="calcIdade()">
           
        </p>
        <p>
            <label for="idade">Sua idade aproximada é</label> 
            <output id="idade">0</output> anos
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Reset">
        </p>
    </form>
    <script>
       function calcIdade() {
        let atual = new Date().getFullYear()
        idade.innerHTML = atual- Number(iano.value) 
        }
    </script>
</body>
</html>
