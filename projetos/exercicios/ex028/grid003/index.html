<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout na pratica</title>   
    <style>
        div.container {
            border: 3px solid blue;
            height: 250px;
            display:grid;
            padding: 5px;
            gap: 5px;
            grid-template: repeat(3, 1fr)/ repeat(3, 1fr);
            place-content:normal normal ;
            place-items: normal normal ;
        }

        div.item {
            border: 3px solid red;
        }
        #a {
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 4;
        }
        #b {
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 3;

        }
        #c {
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 3;
            grid-column-end: 4;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="a">A</div>
        <div class="item" id="b">B</div>
        <div class="item" id="c">C</div>
    </div>
    
</body>
</html>
